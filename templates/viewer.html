<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の健康Tips｜すえのPTノート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --accent: #41b37d;
    --accent-light: #e8f7f0;
    --accent-deep: #2d8a5e;
    --text-primary: #1a1a1a;
    --text-secondary: #5a5a5a;
    --text-muted: #a0a0a0;
    --border: #e8e4dc;
    --tag-bg: #f0ede6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ヘッダー */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .logo span { color: var(--accent); }

  .header-date {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* タブ */
  .tabs {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    padding: 0 24px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }
  .tab.active { color: var(--text-primary); font-weight: 500; border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text-secondary); }

  /* メイン */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 24px 0;
  }

  /* 一覧 */
  .day-header {
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease both;
  }
  .day-header h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .day-header p { font-size: 13px; color: var(--text-muted); font-weight: 300; }

  .cards { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s;
    animation: fadeUp 0.4s ease both;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.12s; }
  .card:nth-child(3) { animation-delay: 0.19s; }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); transform: translateY(-2px); }

  .card-inner { padding: 20px 22px; }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .category-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--accent-light);
    color: var(--accent-deep);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
  }

  .card-num { font-size: 11px; color: var(--text-muted); }

  .card h3 {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .card-lead {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.75;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    padding: 10px 22px;
    border-top: 1px solid var(--bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fdfcfa;
  }

  .card-footer-left { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }

  .avatar-sm {
    width: 22px; height: 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: white; font-weight: 700;
  }

  .stars-sm { color: var(--accent); font-size: 10px; letter-spacing: -1px; }
  .read-more { font-size: 12px; color: var(--accent); }

  /* 詳細 */
  .detail-view { display: none; animation: fadeUp 0.35s ease both; }
  .detail-view.active { display: block; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    margin-bottom: 24px;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .detail-category-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .detail-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 24px;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .author-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .avatar-md {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: white; font-weight: 700;
  }

  .author-name { font-size: 13px; font-weight: 500; }
  .author-role { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .tips-card {
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 18px 22px;
    margin-bottom: 28px;
  }
  .tips-card p {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    line-height: 1.85;
    font-weight: 500;
  }

  .detail-text {
    font-size: 15px;
    line-height: 1.95;
    color: var(--text-secondary);
    margin-bottom: 28px;
  }

  .pt-note {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    position: relative;
    margin-bottom: 28px;
  }
  .pt-note::before {
    content: '💬';
    position: absolute;
    top: -12px; left: 18px;
    background: var(--bg);
    padding: 0 4px;
    font-size: 18px;
  }
  .pt-note p { font-size: 14px; line-height: 1.85; color: var(--text-secondary); font-style: italic; }
  .pt-note .sig { margin-top: 10px; font-size: 12px; color: var(--text-muted); font-style: normal; text-align: right; }

  .post-box {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 24px;
  }
  .post-box p { font-size: 14px; line-height: 1.85; }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    background: var(--text-primary);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .copy-btn:hover { background: #333; }
  .copy-btn.copied { background: var(--accent); }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 0;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .meta-item { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
  .stars { color: var(--accent); letter-spacing: -1px; }

  .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; }
  .tag { background: var(--tag-bg); color: var(--text-secondary); font-size: 12px; padding: 4px 12px; border-radius: 20px; }

  .pagination {
    display: flex;
    justify-content: space-between;
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .page-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
  }
  .page-btn:hover { border-color: var(--accent); color: var(--accent); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">すえの<span>PT</span>ノート</div>
  <div class="header-date">2026年4月15日（水）</div>
</header>

<nav class="tabs">
  <div class="tab active" onclick="switchTab(this)">今日の3本</div>
  <div class="tab" onclick="switchTab(this)">今週のまとめ</div>
  <div class="tab" onclick="switchTab(this)">アーカイブ</div>
</nav>

<main>

  <div id="list-view">
    <div class="day-header">
      <h2>今日の健康Tips</h2>
      <p>運動・食事・睡眠の3テーマをお届けします</p>
    </div>

    <div class="cards">
      <button class="card" onclick="openDetail(0)">
        <div class="card-inner">
          <div class="card-top">

          </div>
          <h3>「座りすぎ」は喫煙と同じくらい<br>体に悪いって、本当だった</h3>
          <p class="card-lead">1日8時間以上座り続けると、死亡リスクが最大60%上昇するという研究があります。30分に1回立ち上がるだけで、そのリスクを大幅に下げられます。</p>
        </div>

          <div class="card-footer-left">

          </div>
          <span class="read-more">読む →</span>
        </div>
      </button>

      <button class="card" onclick="openDetail(1)">
        <div class="card-inner">
          <div class="card-top">
            <span class="category-badge">🥦 食事・栄養</span>
            <span class="card-num">02 / 03</span>
          </div>
          <h3>腸内環境を整えるだけで<br>免疫力が劇的に変わる理由</h3>
          <p class="card-lead">免疫細胞の約70%は腸に集中しています。毎日の食事に発酵食品をひとつ加えるだけで、腸内細菌のバランスが整い始めます。</p>
        </div>
        <div class="card-footer">
          <div class="card-footer-left">
            <div class="avatar-sm">す</div>
            <span>すえ（PT）</span>
            <span class="stars-sm">★★★</span>
          </div>
          <span class="read-more">読む →</span>
        </div>
      </button>

      <button class="card" onclick="openDetail(2)">
        <div class="card-inner">
          <div class="card-top">
            <span class="category-badge">🌙 睡眠・休養</span>
            <span class="card-num">03 / 03</span>
          </div>
          <h3>寝る前のスマホが、睡眠の質を<br>思った以上に下げていた</h3>
          <p class="card-lead">就寝1時間前のスマホ使用は、深い睡眠の割合を最大20%減らすという研究があります。夜の光の質を変えるだけで、朝の目覚めが変わります。</p>
        </div>
        <div class="card-footer">
          <div class="card-footer-left">
            <div class="avatar-sm">す</div>
            <span>すえ（PT）</span>
            <span class="stars-sm">★★</span>
          </div>
          <span class="read-more">読む →</span>
        </div>
      </button>
    </div>

    <div class="pagination" style="margin-top:32px">
      <button class="page-btn">← 昨日</button>
      <button class="page-btn">明日 →</button>
    </div>
  </div>

  <div id="detail-view" class="detail-view"></div>

</main>

<script>
const tips = [
  {
    category: '🏃 運動・リハビリ',
    title: '「座りすぎ」は喫煙と同じくらい体に悪いって、本当だった',
    core: '1日8時間以上座り続けると、死亡リスクが最大60%上昇するという研究があります。30分に1回、立ち上がるだけで、そのリスクを大幅に下げられます。',
    detail: 'Lancetに掲載された100万人以上を対象とした大規模研究によると、「座位時間の長さ」は心疾患・糖尿病・がんのリスクと強く関連しています。<br><br>重要なのは、週末にまとめて運動しても「座りすぎ」のリスクを相殺できないという点。毎日こまめに動くことが鍵です。<br><br>目安は「30分座ったら3分立つ」。飲み物を取りに行く・電話は立って受けるなど、小さな工夫で習慣化できます。',
    pt: 'デイケアの利用者さんを見ていても、「動く習慣がある人」は明らかに元気が長持ちします。激しい運動じゃなくていい。立って歩いて、それだけで体は応えてくれます。僕自身、犬の散歩が習慣になってから腰の重さが全然違います。',
    post: '「30分座ったら立ち上がる」これだけで死亡リスクが下がるって知ってますか？🪑\n\n1日8時間以上の座りすぎは喫煙並みのリスクという研究があります。激しい運動じゃなくていい。立って、少し歩く。それだけで体は応えてくれます。\n\nPT歴8年の僕が一番大事にしている習慣の話でした💪\n\n#健康 #理学療法士 #リベシティ #予防',
    source: 'Lancet / NHK健康チャンネル',
    stars: '★★★', reliability: '高（査読論文）',
    tags: ['#座りすぎ','#生活習慣','#予防医学','#理学療法']
  },
  {
    category: '🥦 食事・栄養',
    title: '腸内環境を整えるだけで免疫力が劇的に変わる理由',
    core: '免疫細胞の約70%は腸に集中しています。毎日の食事に発酵食品をひとつ加えるだけで、腸内細菌のバランスが整い始めます。',
    detail: '腸は「第2の脳」とも呼ばれ、免疫応答の中心的な役割を担っています。腸内フローラのバランスが崩れると、アレルギー・慢性炎症・気分の落ち込みにまで影響することがわかっています。<br><br>発酵食品（ヨーグルト・味噌・納豆・ぬか漬けなど）には生きた乳酸菌が含まれ、毎日継続することで腸内環境の改善が期待できます。<br><br>食物繊維（野菜・きのこ・海藻）と組み合わせると、善玉菌のエサになりさらに効果的です。',
    pt: '患者さんに「食欲がない」「疲れやすい」と言われたとき、食事の話を聞くと発酵食品がほとんど入っていないことが多いです。味噌汁一杯から始めてもらうだけで、3週間後に「なんか体が軽くなった」と言ってくれる方がいます。',
    post: '腸を整えるだけで、免疫・気分・疲れやすさまで変わります🦠\n\n免疫細胞の70%は腸にいます。難しいことをしなくていい。毎日の食事に発酵食品（納豆・ヨーグルト・味噌汁）をひとつ足すだけでOK。\n\nデイケアで実感している、小さくて大事な習慣のひとつです✨\n\n#腸活 #免疫力 #食事 #健康習慣',
    source: '厚生労働省 e-ヘルスネット / Nature Medicine',
    stars: '★★★', reliability: '高（査読論文）',
    tags: ['#腸活','#免疫力','#発酵食品','#栄養']
  },
  {
    category: '🌙 睡眠・休養',
    title: '寝る前のスマホが、睡眠の質を思った以上に下げていた',
    core: '就寝1時間前のスマホ使用は、深い睡眠の割合を最大20%減らすという研究があります。夜の光の質を変えるだけで、朝の目覚めが変わります。',
    detail: 'スマホのブルーライトは、睡眠ホルモン「メラトニン」の分泌を抑制します。メラトニンが出にくくなると、入眠が遅れ・深い睡眠（ノンレム睡眠）が減少します。<br><br>特に問題なのは「明るさ」だけでなく「SNSや動画の情報刺激」。脳が興奮状態になり、質の高い睡眠に入りにくくなります。<br><br>対策は「寝る1時間前からスマホを別室へ」か「夜間モード＋読書に切り替える」。数日で効果を実感できる人が多いです。',
    pt: '「最近眠れない」と話してくれる利用者さんに聞くと、夜中にスマホを見てしまうパターンが多い。体を動かす仕事をしている僕も、スマホをやめた夜は明らかに翌朝の目覚めが違います。睡眠は「時間」より「質」だと実感しています。',
    post: '寝る前のスマホ、やめるだけで朝が変わります📱💤\n\nブルーライトが睡眠ホルモンを抑えて、深い眠りを最大20%も減らすという研究があります。\n\n今夜から「寝る1時間前はスマホを遠ざける」だけ試してみてください。数日で朝の目覚めが変わるはずです。\n\n#睡眠 #スマホ断ち #健康習慣 #リベシティ',
    source: 'NHK健康チャンネル / Sleep Medicine Reviews',
    stars: '★★', reliability: '中〜高（信頼メディア）',
    tags: ['#睡眠','#ブルーライト','#夜のルーティン','#休養']
  }
];

function openDetail(index) {
  const t = tips[index];
  const detailEl = document.getElementById('detail-view');
  document.getElementById('list-view').style.display = 'none';

  detailEl.innerHTML = `
    <button class="back-btn" onclick="closeDetail()">← 今日の3本に戻る</button>

    <div class="detail-category-row">
      <span class="category-badge">${t.category}</span>
      <span style="font-size:12px;color:var(--text-muted)">${String(index+1).padStart(2,'0')} / 03</span>
    </div>

    <h2 class="detail-title">${t.title}</h2>

    <div class="author-row">
      <div class="avatar-md">す</div>
      <div>
        <div class="author-name">すえ（太一）</div>
        <div class="author-role">理学療法士 / Fukui</div>
      </div>
    </div>

    <div class="section-label">今日のTips</div>
    <div class="tips-card"><p>${t.core}</p></div>

    <div class="section-label">もう少し詳しく</div>
    <p class="detail-text">${t.detail}</p>

    <div class="section-label">PTすえのひとこと</div>
    <div class="pt-note">
      <p>${t.pt}</p>
      <div class="sig">— 理学療法士 すえ</div>
    </div>

    <div class="section-label">リベシティ投稿用テキスト</div>
    <div class="post-box">
      <p id="post-text-${index}">${t.post.replace(/\n/g,'<br>')}</p>
      <button class="copy-btn" id="copy-btn-${index}" onclick="copyText(${index})">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        コピーする
      </button>
    </div>

    <div class="meta-row">
      <div class="meta-item">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        ${t.source}
      </div>
      <div class="meta-item">
        <span class="stars">${t.stars}</span>
        <span>信頼度：${t.reliability}</span>
      </div>
    </div>

    <div class="tags">${t.tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}</div>

    <div class="pagination">
      ${index > 0 ? `<button class="page-btn" onclick="openDetail(${index-1})">← 前のTips</button>` : '<span></span>'}
      ${index < tips.length-1 ? `<button class="page-btn" onclick="openDetail(${index+1})">次のTips →</button>` : '<span></span>'}
    </div>
  `;

  detailEl.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeDetail() {
  document.getElementById('list-view').style.display = 'block';
  const d = document.getElementById('detail-view');
  d.classList.remove('active');
  d.innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function copyText(index) {
  navigator.clipboard.writeText(tips[index].post).then(() => {
    const btn = document.getElementById(`copy-btn-${index}`);
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 16 4 11"/></svg> コピーしました`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> コピーする`;
    }, 2500);
  });
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}
</script>

</body>
</html>
